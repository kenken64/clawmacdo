[package]
name = "clawmacdo-cli"
version = "0.4.0"
edition = "2021"
description = "CLI tool for migrating OpenClaw from Mac/DO to DigitalOcean"

[[bin]]
name = "clawmacdo"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
dotenvy = { workspace = true }
tokio = { workspace = true }

# Internal crates
clawmacdo-core = { workspace = true }
clawmacdo-cloud = { workspace = true }
clawmacdo-provision = { workspace = true }
clawmacdo-db = { workspace = true }
clawmacdo-ssh = { workspace = true }
clawmacdo-ui = { workspace = true }