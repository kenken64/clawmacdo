[package]
name = "clawmacdo-cli"
version = "0.4.0"
edition = "2021"
description = "CLI tool for migrating OpenClaw from Mac/DO to DigitalOcean"

[[bin]]
name = "clawmacdo"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
axum = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true }
console = { workspace = true }
dialoguer = { workspace = true }
dotenvy = { workspace = true }
flate2 = { workspace = true }
rusqlite = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tar = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
uuid = { workspace = true }

# Internal crates
clawmacdo-core = { workspace = true }
clawmacdo-cloud = { workspace = true }
clawmacdo-provision = { workspace = true }
clawmacdo-db = { workspace = true }
clawmacdo-ssh = { workspace = true }
clawmacdo-ui = { workspace = true }