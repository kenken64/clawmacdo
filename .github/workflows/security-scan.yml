name: Security Scan CI
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
jobs:
  run-scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run unit tests
        shell: pwsh
        run: ./tests/unit/test_format_and_eval.ps1
      - name: Run integration test
        shell: pwsh
        run: ./tests/integration/test_run_all.ps1
