name: Security Scan CI
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
jobs:
  run-scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Make scripts executable
        run: chmod +x scripts/*.sh || true
      - name: Run unit tests
        run: ./tests/unit/test_format_and_eval.sh
      - name: Run integration test
        run: ./tests/integration/test_run_all.sh
