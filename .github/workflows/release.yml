name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full builds (all features)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: clawmacdo-linux-amd64-full
            features: ""
            binary_name: clawmacdo
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: clawmacdo-darwin-arm64-full
            features: ""
            binary_name: clawmacdo
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact: clawmacdo-windows-amd64-full
            features: ""
            binary_name: clawmacdo.exe
          
          # Minimal builds (CLI only, no web UI)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: clawmacdo-linux-amd64-minimal
            features: "--no-default-features --features minimal"
            binary_name: clawmacdo
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: clawmacdo-darwin-arm64-minimal
            features: "--no-default-features --features minimal"
            binary_name: clawmacdo
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact: clawmacdo-windows-amd64-minimal
            features: "--no-default-features --features minimal"
            binary_name: clawmacdo.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-${{ matrix.features }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
          if echo "${{ matrix.target }}" | grep -q windows; then
            sudo apt-get install -y gcc-mingw-w64-x86-64
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Strip binary (Linux/macOS)
        if: ${{ !contains(matrix.target, 'windows') }}
        run: |
          if command -v strip >/dev/null 2>&1; then
            strip target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          fi

      - name: Package (Unix)
        if: ${{ !contains(matrix.target, 'windows') }}
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.artifact }}.tar.gz ${{ matrix.binary_name }}
          cd ../../..

      - name: Package (Windows)
        if: ${{ contains(matrix.target, 'windows') }}
        run: |
          cd target/${{ matrix.target }}/release
          zip ../../../${{ matrix.artifact }}.zip ${{ matrix.binary_name }}
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Run tests
        run: cargo test --workspace

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

  release:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate release body
        id: release_body
        run: |
          cat > release_notes.md << 'EOF'
          ## 🚀 ClawMacdo v${{ github.ref_name }}

          ### ✨ What's New
          - **Modular Workspace Architecture** - Refactored from monolithic to 7 focused crates
          - **Binary Size Optimization** - 32% smaller builds with feature flags
          - **Multiple Build Variants** - Full, minimal, and cloud-specific builds

          ### 📦 Available Downloads

          | Platform | Architecture | Full Build | Minimal Build |
          |----------|--------------|------------|---------------|
          | **Linux** | x86_64 | `clawmacdo-linux-amd64-full.tar.gz` | `clawmacdo-linux-amd64-minimal.tar.gz` |
          | **macOS** | Apple Silicon | `clawmacdo-darwin-arm64-full.tar.gz` | `clawmacdo-darwin-arm64-minimal.tar.gz` |
          | **Windows** | x86_64 | `clawmacdo-windows-amd64-full.zip` | `clawmacdo-windows-amd64-minimal.zip` |

          ### 🎯 Build Variants

          - **Full Build** (~4.6MB) - All features including web UI, both cloud providers
          - **Minimal Build** (~3.1MB) - CLI only, no web UI (32% smaller)

          ### 🏗️ Project Structure
          ```
          crates/
          ├── clawmacdo-cli/      # 🖥️  Main CLI binary & commands
          ├── clawmacdo-core/     # 🔧  Config, errors, types  
          ├── clawmacdo-cloud/    # ☁️   Cloud providers (DO, Tencent)
          ├── clawmacdo-provision/# 🔨  Server provisioning logic
          ├── clawmacdo-db/       # 💾  Database operations
          ├── clawmacdo-ssh/      # 🔑  SSH/key management
          └── clawmacdo-ui/       # 🎨  Web UI & progress
          ```

          ### ⚡ Quick Start
          ```bash
          # Download and extract
          wget https://github.com/kenken64/clawmacdo/releases/download/${{ github.ref_name }}/clawmacdo-linux-amd64-minimal.tar.gz
          tar -xzf clawmacdo-linux-amd64-minimal.tar.gz
          chmod +x clawmacdo
          
          # Deploy OpenClaw
          export DO_TOKEN="your_token"
          ./clawmacdo deploy --customer-name "my-openclaw"
          ```
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            *.tar.gz
            *.zip
